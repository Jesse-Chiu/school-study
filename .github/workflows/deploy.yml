name: Deploy to Tencent COS

on:
  push:
    branches: [main]
  # 也支持手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Tencent COS
        uses: zkqiang/tencent-cos-action@v0.1.1
        with:
          args: upload -r --delete ./dist/ /
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          bucket: ${{ vars.COS_BUCKET }}
          region: ${{ vars.COS_REGION }}
